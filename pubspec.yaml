name: esas_v1
description: "ESAS V1"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  # Riverpod 3.x - StateNotifier migrated to Notifier pattern
  flutter_riverpod: ^3.1.0
  dio: ^5.4.0
  http_parser: ^4.0.2
  go_router: ^14.0.0
  intl: ^0.20.0
  flutter_localizations:
    sdk: flutter
  flutter_holo_date_picker: ^2.0.0
  url_launcher: ^6.3.2
  syncfusion_flutter_pdfviewer: ^31.2.5
  file_picker: ^10.3.6
  flutter_slidable: ^4.0.3
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  scrollable_positioned_list: ^0.3.8
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  device_info_plus: ^12.3.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  flutter_native_splash: ^2.4.7

  # state_notifier removed - using Riverpod 3 Notifier pattern

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/ic_launcher_regular.png"
  image_path_ios: "assets/images/ic_launcher_regular.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  # Android 8.0+ adaptive icon - logo padded to 58% of canvas, 29% margin each side
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ic_launcher_fg.png"
  web:
    generate: true
    image_path: "assets/images/ic_launcher_regular.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - web/favicon.png
    - assets/images/
